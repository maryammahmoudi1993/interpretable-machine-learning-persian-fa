## 2. `mkdocs.yml`

جای `USERNAME` را با یوزرنیم گیت‌هابت عوض کن.

```yaml
site_name: ترجمه فارسی Interpretable Machine Learning
site_description: ترجمه فارسی غیررسمی کتاب Interpretable Machine Learning نوشته Christoph Molnar
site_url: https://USERNAME.github.io/interpretable-ml-book-fa/

repo_url: https://github.com/USERNAME/interpretable-ml-book-fa
repo_name: USERNAME/interpretable-ml-book-fa

theme:
  name: material
  language: fa
  direction: rtl
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight

extra_css:
  - stylesheets/extra.css

nav:
  - خانه: index.md

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - pymdownx.superfences
