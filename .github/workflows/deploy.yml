name: Deploy mdBook

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - run: mdbook build

      - run: python3 scripts/fix-index-links.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

      - uses: actions/deploy-pages@v4